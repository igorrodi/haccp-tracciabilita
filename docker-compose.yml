services:
  haccp:
    image: ghcr.io/igorrodi/haccp-tracciabilita:latest
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    # Quando il profilo "https" è attivo, Caddy fa da reverse proxy: haccp resta interno.
    # Senza profilo (default), espone 80 direttamente sull'host.
    ports: !override
      - "80:80"
      - "631:631"
    volumes:
      # Separazione codice/dati: tutti i dati persistenti vivono in ./data
      - ./data/pb_data:/pb/pb_data
      - ./data/backups:/pb/pb_data/backups
      - ./pb_schema.json:/pb/pb_schema.json:ro
      # rclone.conf vive dentro pb_data (scritto dall'hook cloud_backup.pb.js)
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    mem_limit: 512m
    cpu_shares: 512
    environment:
      - POCKETBASE_PRAGMA_JOURNAL_MODE=wal
      - POCKETBASE_PRAGMA_SYNCHRONOUS=normal
      - POCKETBASE_PRAGMA_BUSY_TIMEOUT=5000
      - PB_SUPERUSER_EMAIL=admin@haccp.local
      - PB_SUPERUSER_PASSWORD=Admin123456!
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - haccp-net

  # ---- Reverse proxy HTTPS (opzionale) ----
  # Attiva con:  docker compose --profile https up -d
  # Oppure usa:  bash scripts/setup-https.sh
  caddy:
    image: caddy:2-alpine
    platform: linux/arm64
    profiles: ["https"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    depends_on:
      - haccp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - haccp-net

networks:
  haccp-net:
    driver: bridge

