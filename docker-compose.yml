services:
  haccp:
    image: ghcr.io/igorrodi/haccp-tracciabilita:latest
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    ports:
      - "80:80"
      - "631:631"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_schema.json:/pb/pb_schema.json:ro
      - ./rclone.conf:/pb/pb_data/rclone.conf:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    environment:
      - POCKETBASE_PRAGMA_JOURNAL_MODE=wal
      - POCKETBASE_PRAGMA_SYNCHRONOUS=normal
      - POCKETBASE_PRAGMA_BUSY_TIMEOUT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
